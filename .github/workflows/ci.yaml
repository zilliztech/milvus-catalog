name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    env:
      MILVUS_CONF_LOCALSTORAGE_PATH: /tmp/milvus-catalog-ci/milvus-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          files="$(gofmt -l $(find . -name '*.go'))"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check local replaces
        run: |
          if grep -nE '=>[[:space:]]*(\.|/|[A-Za-z]:\\)' go.mod; then
            echo "go.mod contains local replace directives"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test -race ./...

      - name: Build
        run: go build ./...
